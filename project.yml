# XcodeGen 프로젝트 정의 (권장 경로).
#   brew install xcodegen && cd RuneRivals && xcodegen generate && open RuneRivals.xcodeproj
# 엔진 소스(Sources/RuneRivalsEngine)를 앱 타깃에 직접 컴파일 → 별도 패키지 링크 불필요.
name: RuneRivals
options:
  bundleIdPrefix: com.runerivals
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  RuneRivals:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Sources/RuneRivalsEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.runerivals.app
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
